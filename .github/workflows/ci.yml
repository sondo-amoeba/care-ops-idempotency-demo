name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: careops
          POSTGRES_PASSWORD: careops
          POSTGRES_DB: careops_demo
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U careops -d careops_demo"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_USER: careops
      POSTGRES_PASSWORD: careops
      POSTGRES_DB: careops_demo
      REDIS_URL: redis://localhost:6379

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Test API (Vitest e2e)
        run: pnpm test

      - name: Build API
        run: pnpm --filter @care-ops/api build

      - name: Build web
        run: pnpm --filter @care-ops/web build
